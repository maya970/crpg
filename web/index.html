<!DOCTYPE html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>冒险者地牢 · Initia</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f1620'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='%235eead4' font-size='16' font-family='system-ui'%3E冒%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="margin:0;background:#070b10;color:#e8eef5">
    <div id="root">
      <p
        id="rpg-static-boot"
        style="
          margin:0;
          padding:2rem 1.25rem;
          color:#7a8fa3;
          font-family:system-ui,sans-serif;
          font-size:0.95rem;
          line-height:1.5;
          max-width:28rem;
        "
      >
        正在加载游戏壳…<br />
        <span style="font-size:0.8rem;opacity:0.85"
          >若长时间只有黑屏，请 F12 打开「控制台」查看红色报错；并确认能访问本站的 .js 脚本（部分网络会拦截 vercel.app）。</span
        >
      </p>
    </div>
    <script>
      setTimeout(function () {
        if (window.__RPG_APP_READY) return;
        var p = document.getElementById('rpg-static-boot');
        if (p) {
          p.innerHTML =
            '脚本仍未执行。可能原因：<strong style="color:#fca5a5">主 JS 未加载</strong>（网络/广告拦截）、或构建异常。<br />请在本页「网络」面板查看是否有红色的 index-*.js / 资源 404。';
          p.style.color = '#e8eef5';
        }
      }, 10000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
