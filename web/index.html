<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adventurer</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230f1620'/%3E%3Ctext x='16' y='22' text-anchor='middle' fill='%235eead4' font-size='14' font-family='system-ui'%3EA%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body style="margin:0;background:#070b10;color:#e8eef5">
    <div id="root">
      <p
        id="rpg-static-boot"
        style="
          margin:0;
          padding:2rem 1.25rem;
          color:#7a8fa3;
          font-family:system-ui,sans-serif;
          font-size:0.95rem;
          line-height:1.5;
          max-width:28rem;
        "
      >
        Loading…<br />
        <span style="font-size:0.8rem;opacity:0.85">If nothing appears for a while, try refreshing the page.</span>
      </p>
    </div>
    <script>
      setTimeout(function () {
        if (window.__RPG_APP_READY) return;
        var p = document.getElementById('rpg-static-boot');
        if (p) {
          p.innerHTML =
            'The game is taking longer than usual to start. Try refreshing, or open this site in another browser.';
          p.style.color = '#e8eef5';
        }
      }, 10000);
    </script>
    <script type="module" src="/src/entry.tsx"></script>
  </body>
</html>
