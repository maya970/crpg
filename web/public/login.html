<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Adventurer · Sign in</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="rpg-view-auth">
  <script>window.RPG_AUTH_REDIRECT = 'town.html';</script>
  <div id="auth-overlay" class="auth-overlay open" aria-modal="true" role="dialog">
    <div class="auth-card">
      <h1>Adventurer</h1>
      <p class="auth-hint">This build uses your wallet from the main game page. Open the home page, connect, then return here if needed.</p>
      <label class="auth-label">Username <input id="auth-user" type="text" autocomplete="username" maxlength="32" placeholder="3–32 letters, numbers, underscore"></label>
      <label class="auth-label">Password <input id="auth-pass" type="password" autocomplete="current-password" placeholder="At least 6 characters"></label>
      <p id="auth-msg" class="auth-error" style="display:none"></p>
      <div class="auth-actions">
        <button type="button" id="btn-auth-login" class="auth-btn primary">Sign in</button>
        <button type="button" id="btn-auth-register" class="auth-btn">Create account</button>
      </div>
      <p class="auth-foot">One account, one hero.</p>
    </div>
  </div>

  <script src="js/api-client.js"></script>
  <script src="js/rpg-build-check.js"></script>
  <script src="js/auth-ui.js"></script>
</body>
</html>
